# Probe template for btrfs device delete /dev/sdX /mnt/pool.
# Copy to /etc/task-progress.d/name.conf and adjust DEVICE/MOUNTPOINT/TITLE.

GROUP="${GROUP:-idc-infra}"
TITLE="${TITLE:-btrfs device delete}"
DEVICE="${DEVICE:-/dev/sdf1}"
MOUNTPOINT="${MOUNTPOINT:-/mnt/bulk}"

remaining_bytes() {
	btrfs filesystem show "$MOUNTPOINT" \
		| awk -v dev="$DEVICE" '$0 ~ dev { for (i = 1; i <= NF; i++) if ($i == "used") print $(i + 1) }' \
		| tail -n 1 \
		| while IFS= read -r value; do size_to_bytes "$value"; done
}

is_done() {
	! btrfs filesystem show "$MOUNTPOINT" | grep -Fq "$DEVICE"
}

is_healthy() {
	pgrep -f "btrfs device delete.*$DEVICE" >/dev/null 2>&1
}

extra_detail() {
	btrfs filesystem usage "$MOUNTPOINT" 2>/dev/null | sed -n '1,8p' || true
}

completion_detail() {
	printf '%s 已从 %s 移除，可执行人工复核后拔盘。\n' "$DEVICE" "$MOUNTPOINT"
}
