# Probe template for btrfs scrub.
# btrfs scrub does not expose a stable remaining byte counter everywhere; this
# template estimates remaining bytes from scrubbed bytes in "btrfs scrub status".

GROUP="${GROUP:-idc-infra}"
TITLE="${TITLE:-btrfs scrub}"
MOUNTPOINT="${MOUNTPOINT:-/mnt/bulk}"
TOTAL_BYTES="${TOTAL_BYTES:-0}"

remaining_bytes() {
	local scrubbed
	scrubbed=$(btrfs scrub status "$MOUNTPOINT" 2>/dev/null \
		| awk '/scrubbed:/ {print $2}' \
		| tail -n 1 \
		| while IFS= read -r value; do
			if [ -n "$value" ]; then size_to_bytes "$value"; else printf '0\n'; fi
		done)
	if [ "$scrubbed" -ge "$TOTAL_BYTES" ]; then
		printf '0\n'
	else
		printf '%s\n' "$((TOTAL_BYTES - scrubbed))"
	fi
}

is_done() {
	btrfs scrub status "$MOUNTPOINT" 2>/dev/null | grep -qi 'finished'
}

is_healthy() {
	btrfs scrub status "$MOUNTPOINT" 2>/dev/null | grep -qi 'running'
}
