# Probe template for Proxmox Backup Server tasks.
# Point LOG_FILE at a task log and set TOTAL_BYTES to the expected payload size.

GROUP="${GROUP:-idc-infra}"
TITLE="${TITLE:-PBS backup}"
TOTAL_BYTES="${TOTAL_BYTES:-0}"
LOG_FILE="${LOG_FILE:-/var/log/pbs-task.log}"
PROCESS_PATTERN="${PROCESS_PATTERN:-proxmox-backup-client}"

remaining_bytes() {
	local copied
	copied=$(awk '
		/processed/ {
			for (i = 1; i <= NF; i++) if ($i ~ /^[0-9.]+[KMGT]i?B$/) last = $i
		}
		END {print last}
	' "$LOG_FILE" 2>/dev/null | while IFS= read -r value; do
		if [ -n "$value" ]; then size_to_bytes "$value"; else printf '0\n'; fi
	done)
	if [ "$copied" -ge "$TOTAL_BYTES" ]; then
		printf '0\n'
	else
		printf '%s\n' "$((TOTAL_BYTES - copied))"
	fi
}

is_done() {
	grep -qi 'backup finished' "$LOG_FILE" 2>/dev/null
}

is_healthy() {
	pgrep -f "$PROCESS_PATTERN" >/dev/null 2>&1
}
