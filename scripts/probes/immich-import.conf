# Probe template for immich import jobs.
# Estimate progress by imported destination bytes or by a staging directory.

GROUP="${GROUP:-idc-infra}"
TITLE="${TITLE:-immich import}"
TOTAL_BYTES="${TOTAL_BYTES:-0}"
DEST_DIR="${DEST_DIR:-/var/lib/immich/upload}"
PROCESS_PATTERN="${PROCESS_PATTERN:-immich}"

remaining_bytes() {
	local copied
	copied=$(dir_bytes "$DEST_DIR")
	if [ "$copied" -ge "$TOTAL_BYTES" ]; then
		printf '0\n'
	else
		printf '%s\n' "$((TOTAL_BYTES - copied))"
	fi
}

is_done() {
	[ "$(remaining_bytes)" -eq 0 ] && ! pgrep -f "$PROCESS_PATTERN" >/dev/null 2>&1
}

is_healthy() {
	pgrep -f "$PROCESS_PATTERN" >/dev/null 2>&1
}
