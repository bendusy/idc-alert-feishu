# Probe template for dd status=progress logs.
# Start dd with: dd ... status=progress 2> /var/log/dd-task.progress

GROUP="${GROUP:-idc-infra}"
TITLE="${TITLE:-dd disk copy}"
TOTAL_BYTES="${TOTAL_BYTES:-0}"
PROGRESS_FILE="${PROGRESS_FILE:-/var/log/dd-task.progress}"
DD_PATTERN="${DD_PATTERN:-dd .*status=progress}"

remaining_bytes() {
	local copied
	copied=$(awk '/bytes/ {last=$1} END {print last + 0}' "$PROGRESS_FILE" 2>/dev/null || printf '0')
	if [ "$copied" -ge "$TOTAL_BYTES" ]; then
		printf '0\n'
	else
		printf '%s\n' "$((TOTAL_BYTES - copied))"
	fi
}

is_done() {
	[ "$(remaining_bytes)" -eq 0 ] && ! pgrep -f "$DD_PATTERN" >/dev/null 2>&1
}

is_healthy() {
	pgrep -f "$DD_PATTERN" >/dev/null 2>&1
}
