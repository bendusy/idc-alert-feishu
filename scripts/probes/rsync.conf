# Probe template for large rsync migrations.
# It estimates progress by destination file bytes, so keep TOTAL_BYTES current.

GROUP="${GROUP:-idc-infra}"
TITLE="${TITLE:-rsync migration}"
TOTAL_BYTES="${TOTAL_BYTES:-0}"
DEST_DIR="${DEST_DIR:-/data/target}"
RSYNC_PATTERN="${RSYNC_PATTERN:-rsync .* $DEST_DIR}"

remaining_bytes() {
	local copied
	copied=$(dir_bytes "$DEST_DIR")
	if [ "$copied" -ge "$TOTAL_BYTES" ]; then
		printf '0\n'
	else
		printf '%s\n' "$((TOTAL_BYTES - copied))"
	fi
}

is_done() {
	[ "$(remaining_bytes)" -eq 0 ] && ! pgrep -f "$RSYNC_PATTERN" >/dev/null 2>&1
}

is_healthy() {
	pgrep -f "$RSYNC_PATTERN" >/dev/null 2>&1
}

extra_detail() {
	printf '目标目录: %s\n' "$DEST_DIR"
	printf '目标总量: %s\n' "$(human_bytes "$TOTAL_BYTES")"
}
