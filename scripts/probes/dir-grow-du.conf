# Probe template for imports where a destination directory grows toward TOTAL_BYTES.

GROUP="${GROUP:-idc-infra}"
TITLE="${TITLE:-directory growth task}"
TOTAL_BYTES="${TOTAL_BYTES:-0}"
DEST_DIR="${DEST_DIR:-/data/import}"
PROCESS_PATTERN="${PROCESS_PATTERN:-}"

remaining_bytes() {
	local copied
	copied=$(dir_bytes "$DEST_DIR")
	if [ "$copied" -ge "$TOTAL_BYTES" ]; then
		printf '0\n'
	else
		printf '%s\n' "$((TOTAL_BYTES - copied))"
	fi
}

is_done() {
	[ "$(remaining_bytes)" -eq 0 ]
}

is_healthy() {
	[ -z "$PROCESS_PATTERN" ] || pgrep -f "$PROCESS_PATTERN" >/dev/null 2>&1
}
